name: Release

on:
  push:
    tags: ["v3*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
      - name: Verify the tag matches the package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(uv run --no-project python -c 'import re,pathlib; t=pathlib.Path("src/spotify_scraper/__init__.py").read_text(); print(re.search(r"__version__ = \"([^\"]+)\"", t).group(1))')"
          echo "tag=$tag package=$pkg"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag $tag does not match package version $pkg"
            exit 1
          fi
      - run: uv build
      - run: uv run --no-project --with twine twine check dist/*
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          # Project-scoped PyPI API token stored as a repository secret.
          # (Trusted publishing via OIDC is an even-more-secure alternative
          # that avoids a stored token — see CONTRIBUTING for how to migrate.)
          password: ${{ secrets.PYPI_API_TOKEN }}

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Extract this version's changelog section
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" {flag=1; next}
            flag && /^## \[/ {exit}
            flag {print}
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then echo "See CHANGELOG.md" > release-notes.md; fi
      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md
