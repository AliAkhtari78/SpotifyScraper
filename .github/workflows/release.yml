name: Release

on:
  push:
    tags: ["v3*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Verify the tag matches the package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(uv run --no-project python -c 'import re,pathlib; t=pathlib.Path("src/spotify_scraper/__init__.py").read_text(); print(re.search(r"__version__ = \"([^\"]+)\"", t).group(1))')"
          echo "tag=$tag package=$pkg"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag $tag does not match package version $pkg"
            exit 1
          fi
      - run: uv build
      - run: uv run --no-project --with twine twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC for PyPI trusted publishing — no API token needed
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Extract this version's changelog section
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" {flag=1; next}
            flag && /^## \[/ {exit}
            flag {print}
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then echo "See CHANGELOG.md" > release-notes.md; fi
      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md
