name: Canary

# Daily live check against real Spotify endpoints. This is the early-warning
# system: when Spotify changes its pages/JSON and breaks extraction, the live
# tests fail and a `spotify-breakage` issue is opened or updated (labelled
# `spotify-breakage`).

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: "3.13"
      - run: uv sync --locked --all-extras
      - run: uv run playwright install --with-deps chromium
      - name: Run live tests (excluding lyrics)
        run: uv run pytest -m live -k "not lyrics" --timeout=120 -p no:cacheprovider -q

  # Lyrics depend on a maintainer cookie (SPOTIFY_SP_DC) and Spotify's rotating
  # TOTP secret; keep them non-blocking so an expired cookie or a rotated secret
  # never reddens the core extraction canary.
  lyrics:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: "3.13"
      - run: uv sync --locked
      - name: Run live lyrics tests (skipped without the cookie)
        env:
          SPOTIFY_SP_DC: ${{ secrets.SPOTIFY_SP_DC }}
        run: uv run pytest -m live -k lyrics --timeout=120 -p no:cacheprovider -q

  report:
    needs: [live]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open or update the breakage issue on failure
        if: needs.live.result == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          existing="$(gh issue list --repo "$REPO" --label spotify-breakage --state open --json number --jq '.[0].number')"
          body="The daily canary's live extraction tests failed. Spotify may have changed its site.

          Run: $RUN_URL

          If you are hitting extraction errors, this is likely the cause — a fix is in progress."
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$REPO" --body "Canary still failing — $RUN_URL"
          else
            gh label create spotify-breakage --repo "$REPO" --color B60205 --description "Live extraction broken (Spotify changed something)" 2>/dev/null || true
            gh issue create --repo "$REPO" --label spotify-breakage \
              --title "Canary: live Spotify extraction is failing" --body "$body"
          fi
      - name: Close the breakage issue on recovery
        if: needs.live.result == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          existing="$(gh issue list --repo "$REPO" --label spotify-breakage --state open --json number --jq '.[0].number')"
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$REPO" --body "Canary recovered — live tests pass again ($RUN_URL). Closing."
            gh issue close "$existing" --repo "$REPO"
          fi
