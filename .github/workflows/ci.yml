name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    # Self-hosted primary, GitHub-hosted fallback. Fork PRs ALWAYS run on
    # GitHub-hosted (untrusted code must never touch the self-hosted machine).
    # Clear the PRIMARY_RUNNER repo variable to fall everything back to GitHub-hosted.
    runs-on: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) && 'ubuntu-latest' || vars.PRIMARY_RUNNER || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  type:
    # Self-hosted primary, GitHub-hosted fallback (fork PRs forced to GitHub-hosted).
    runs-on: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) && 'ubuntu-latest' || vars.PRIMARY_RUNNER || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
      # Install all extras so mypy can resolve optional-dependency imports
      # (e.g. playwright in the browser transport).
      - run: uv sync --locked --all-extras
      - run: uv run mypy src

  test:
    # Always GitHub-hosted: this matrix is the cross-OS coverage guarantee
    # (Linux/macOS/Windows) — a single self-hosted machine can't provide it.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        include:
          - os: macos-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.13"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - run: uv sync --locked
      - run: uv run pytest --cov --cov-report=term

  build:
    # Self-hosted primary, GitHub-hosted fallback (fork PRs forced to GitHub-hosted).
    runs-on: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) && 'ubuntu-latest' || vars.PRIMARY_RUNNER || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
      - run: uv build
      - run: uv run --no-project --with twine twine check dist/*

  browser:
    # Non-blocking: drives a real Chromium browser; no other job depends on it.
    # Always GitHub-hosted: `playwright install --with-deps` is apt-based (Linux only).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          python-version: "3.13"
      - run: uv sync --locked --extra browser
      - run: uv run playwright install --with-deps chromium
      - run: uv run pytest -m browser
