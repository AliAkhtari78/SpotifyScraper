name: Docs

on:
  push:
    branches: [master]
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "src/**"
      - ".github/workflows/docs.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    # Self-hosted primary, GitHub-hosted fallback (fork PRs forced to GitHub-hosted).
    # Clear the PRIMARY_RUNNER repo variable to fall back to GitHub-hosted.
    runs-on: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) && 'ubuntu-latest' || vars.PRIMARY_RUNNER || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          python-version: "3.13"
      # All extras so mkdocstrings can import optional-dependency code paths
      # (e.g. the browser transport) without ImportError during introspection.
      - run: uv sync --group docs --all-extras
      # Strict build: any broken link, missing nav target, or mkdocstrings
      # path error fails CI.
      - run: uv run mkdocs build --strict
