name: Container

# Build the container image and publish it to the GitHub Container Registry
# (ghcr.io/aliakhtari78/spotifyscraper). Runs on pushes to master and on v3*
# tags; uses the built-in GITHUB_TOKEN, so no extra secret is required.

on:
  push:
    branches: [master]
    tags: ["v3*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to also tag the clean multi-arch image with, e.g. 3.6.0"
        required: false
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/aliakhtari78/spotifyscraper
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=raw,value=${{ github.event.inputs.version }},enable=${{ github.event.inputs.version != '' }}
            type=raw,value=v${{ github.event.inputs.version }},enable=${{ github.event.inputs.version != '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Skip the provenance/SBOM attestation manifest, which otherwise shows
          # up on the GitHub Packages page as a stray "unknown/unknown" platform.
          provenance: false
          sbom: false
